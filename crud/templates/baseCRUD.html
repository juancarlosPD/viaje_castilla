{% load static %}

<!doctype html>
<html lang="en">
    <head>
        <title> {% block titulo %} {% endblock %} </title>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <!-- Datatable -->
        

        <!-- Bootstrap CSS v5.0.2 -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"  integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
        <link rel="stylesheet" href="{% static 'librerias/jquery-ui-1.13.1.custom/jquery-ui.min.css' %}">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous">
        <script src="{% static 'librerias/jquery-ui-1.13.1.custom/jquery-ui.min.js' %}"></script>
        <!-- AdminLTE -->
        <script src="{% static 'librerias/librerias/AdminLTE-3.2.0/plugins/fontawesome-free/css/all.min.css' %}"></script>
        <script src="{% static 'librerias/librerias/AdminLTE-3.2.0/dist/css/adminlte.min.css' %}"></script>       
        <!-- CSS personal -->
        <link rel="stylesheet" href="{% static 'css/estilos.css' %}">

        {% block head %} {% endblock %}

       
    </head>
    <body>
        <header>
            <div class="row align-items-center justify-content-center" id="logotipo">
                <div class="col-md-1 ">
                    <figure>
                        
                        <img src="{% static 'img/logo.png' %}" alt="" class="img-fluid">
                    </figure>
                </div>
                <div class="col-md-9 text-center ">
                    <h1>{% block cabecera %} {% endblock %}</h1>
                </div>
                
                <div class="col-md-1 text-center ">
                    {% block imgCabecera %}  {% endblock %}
                </div>
                
                
                
            </div>           
            
        </header>
        <div class="row justify-content-center">
            <div class="col-md-11 text-center align-items-center justify-content-center">
                <nav class="navbar navbar-expand navbar-dark bg-dark mx-3" >
                    <!-- <div class="container justify-content-start border"> -->
                        <a class="navbar-brand mx-3" href="{% url 'inicioPersonal' %}"><i class="fa fa-user" aria-hidden="true" ></i> Personal</a>
                                              
                    <!-- </div> -->
                </nav>
            </div>
            
        </div>
        

        <div class="row justify-content-center">
            
                    {% block contenido %} {% endblock %} 
                
        </div>
        <div class="row my-4 justify-content-center">
            <div class="col-md-11 text-end mx-3 py-2 " style="background-color:#E5E7E9 ;">
                Juan Carlos Perea
            </div>
            
        </div>
      
        <!-- Bootstrap JavaScript Libraries -->
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
        
        <!-- AdminLTE -->
        <script src="{% static 'librerias/librerias/AdminLTE-3.2.0/dist/js/adminlte.min.css' %}"></script>

        {% block datatable %} {% endblock %}
        
    </body>
</html>
